<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBook User Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="Login">
        <div class="login-container">
            <div id="slogan">
                <div class="uniao-logo">
                    <img id="logo" src="https://makemoneyunstoppable.com/wp-content/uploads/2025/07/open-book-2.png" alt="Logo UniBook">
                    <h1>UniBook</h1>
                </div>
                <h4>Mergulhe no mundo dos livros</h4>
            </div>

            <div id="login-form">
                <h3>Log in</h3>
                <input id="email" type="text" placeholder="E-mail institucional"><br>
                <input id="senha" type="password" placeholder="Senha"><br>
                <button class="login-btn" onclick="executarLogin()">Entrar</button>
            </div>
        </div>
    </div>

    <div id="geral" style="display: none;">
        
        <div id="panel-notificacoes" class="notif-panel" style="display:none;">
            <div class="notif-header">
                <span>Notificações</span>
                <button onclick="alternarNotificacoes()">✕</button>
            </div>
            <div id="lista-notificacoes" class="notif-body"></div>
        </div>

        <header class="header">
            <h1>UniBook</h1>
        </header>

        <div id="view-estante" class="main-tab"> 
            <header class="aba-header">
                <h1>Minha Estante</h1>
                <button class="add-btn" onclick="abrirModal()">+</button>
            </header>

            <div class="filter-bar">
                <button id="btn-tenho" class="filter-item active" onclick="trocarSubAba('aba-meus-livros', this)">Meus Livros</button>
                <button id="btn-quero" class="filter-item" onclick="trocarSubAba('aba-quero-ler', this)">Quero Ler</button>
                <button id="btn-emprestados" class="filter-item" onclick="trocarSubAba('aba-emprestados', this)">Emprestados</button>
            </div>

            <main class="feed-container">
                <section id="aba-meus-livros" class="tab-content active"></section>
                <section id="aba-quero-ler" class="tab-content"></section>
                <section id="aba-emprestados" class="tab-content"></section>
            </main>
        </div>

        <div id="view-busca" class="main-tab" style="display:none;">
            <div class="feed-container"><h1>Página de Busca</h1></div>
        </div>

        <div id="view-perfil" class="main-tab" style="display:none;">
            <div class="perfil-container">
                <section class="perfil-header">
                    <div class="avatar-wrapper">
                        <img id="foto-perfil" src="https://static.vecteezy.com/system/resources/thumbnails/027/312/306/small/portrait-of-a-dj-with-headphone-isolated-essential-workers-avatar-icons-characters-for-social-media-and-networking-user-profile-website-and-app-3d-render-illustration-png.png" alt="Avatar">
                        <label class="btn-editar-foto">✎</label>
                    </div>
                    <h2 id="nome-perfil" contenteditable="true">@Lucas</h2>
                    <p id="email-perfil">carregando...</p>
                </section>

                <section class="perfil-stats">
                    <div class="stat-item" onclick="irParaEstante('aba-meus-livros', 'btn-tenho')">
                        <strong id="count-meus">0</strong><span>Meus Livros</span>
                    </div>
                    <div class="stat-item" onclick="irParaEstante('aba-quero-ler', 'btn-quero')">
                        <strong id="count-quero">0</strong><span>Quero Ler</span>
                    </div>
                    <div class="stat-item">
                        <strong id="count-emprestimos">0</strong><span>Emprestados</span>
                    </div>
                    <div class="stat-item">
                        <strong id="count-devolvidos">0</strong><span>Devolvidos</span>
                    </div>
                </section>

                <ul class="perfil-menu">
                    <li onclick="mostrarMeusEmprestimos()"><span>Histórico</span> ➔</li>
                    <li class="logout" onclick="window.location.reload()">Sair da Conta</li>
                </ul>
            </div>
        </div>

        <div id="view-agenda" class="main-tab" style="display:none;">
            <header class="aba-header">
                <h1>Minha Agenda</h1>
                <button class="notif-bell" onclick="alternarNotificacoes()">
                    🔔<span id="badge-notif" class="badge">0</span>
                </button>
            </header>
            <div class="agenda-container">
                <div class="calendar-wrapper">
                    <div class="calendar-header">
                        <button onclick="mudarMes(-1)">❮</button>
                        <h3 id="mes-atual">Março 2026</h3>
                        <button onclick="mudarMes(1)">❯</button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>
                <div class="event-details" id="event-details"></div>
            </div>
        </div>

        <nav class="tab-bar">
            <button class="tab-item" onclick="mudarAbaPrincipal('view-busca', this)">🔍<span>Busca</span></button>
            <button class="tab-item active" onclick="mudarAbaPrincipal('view-estante', this)">📚<span>Estante</span></button>
            <button class="tab-item" onclick="mudarAbaPrincipal('view-perfil', this)">👤<span>Perfil</span></button>
            <button class="tab-item" onclick="mudarAbaPrincipal('view-agenda', this)">📅<span>Agenda</span></button>
        </nav>
    </div> <div id="modal-adicionar" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Adicionar Livro</h2>
            <input type="text" id="input-titulo" placeholder="Título">
            <input type="text" id="input-autor" placeholder="Autor">
            <select id="select-tipo">
                <option value="tenho">Eu tenho este livro</option>
                <option value="desejo">Quero ler este livro</option>
            </select>
            <div class="modal-buttons">
                <button onclick="fecharModal()" class="btn-cancelar">Cancelar</button>
                <button onclick="salvarLivro()" class="btn-salvar">Salvar</button>
            </div>
        </div>
    </div>

    <script>
      // 1. Dados e Estado Global
let emailUsuarioLogado = "";
let historicoEmprestimos = [];
let minhaEstante = [
    { id: 1, titulo: "Castelo nos Ares", autor: "Diana Wynne Jones", status: "tenho" },
    { id: 2, titulo: "Dom Casmurro", autor: "Machado de Assis", status: "tenho" },
    { id: 3, titulo: "O extraordinário", autor: "R.J. Palacio", status: "tenho" },
    { id: 4, titulo: "Dom Quixote", autor: "Miguel de Cervantes", status: "tenho" },
    { id: 5, titulo: "A divina comédia", autor: "Dante Alighieri", status: "emprestado_fora", usuario: "@AngeloMatos", prazo: "24/03" },
    { id: 6, titulo: "A Droga da Obediência", autor: "Pedro Bandeira", status: "comigo", usuario: "@ClaraVas", prazo: "20/03" },
    { id: 7, titulo: "O Espreitador", autor: "A.M. Shine", status: "desejo" },
    { id: 8, titulo: "Coraline", autor: "Neil Gaiman", status: "desejo" }
];
let dataFoco = new Date();

// 2. Login e Inicialização
function executarLogin() {
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;

    if (email.trim() !== "" && senha.trim() !== "") {
        emailUsuarioLogado = email;
        document.getElementById('Login').style.display = 'none';
        document.getElementById('geral').style.display = 'block';
        
        document.getElementById('nome-perfil').innerText = "@" + email.split('@')[0];
        document.getElementById('email-perfil').innerText = email;

        renderizarLivros();
        renderizarCalendario();
        atualizarSino();
    } else {
        alert("Preencha os dados!");
    }
}

// 3. Notificações Flutuantes
function alternarNotificacoes() {
    const painel = document.getElementById('panel-notificacoes');
    if (painel.style.display === 'none') {
        renderizarListaNotificacoes();
        painel.style.display = 'block';
    } else {
        painel.style.display = 'none';
    }
}

function renderizarListaNotificacoes() {
    const lista = document.getElementById('lista-notificacoes');
    lista.innerHTML = "";

    // Notificação Samara
    lista.innerHTML += `
        <div class="notif-item">
            <img src="https://marketplace.canva.com/Dz63E/MAF4KJDz63E/1/tl/canva-user-icon-MAF4KJDz63E.png" class="notif-avatar">
            <div class="notif-content">
                <b>@SamaraRibeiro</b> solicitou o empréstimo de <i>Extraordinário</i>.
                <div class="notif-btn-group">
<button class="btn-aceitar" onclick="alert('Pedido Aceito!')">Aceitar</button>
<button class="btn-recusar" onclick="alternarNotificacoes()">Recusar</button>
                </div>
            </div>
        </div>`;

    // Notificações de Prazos (Simulando hoje dia 20)
    const hoje = 20;
    minhaEstante.forEach(livro => {
        if (livro.prazo) {
            const dia = parseInt(livro.prazo.split('/')[0]);
            const diff = dia - hoje;
            let cor = diff === 0 ? "urgente" : (diff > 0 && diff <= 4 ? "proximo" : "");
            let msg = diff === 0 ? `Vence HOJE: ${livro.titulo}` : (diff > 0 && diff <= 4 ? `Vence em ${diff} dias: ${livro.titulo}` : "");

            if (msg) {
                lista.innerHTML += `<div class="notif-item"><span class="notif-dot ${cor}"></span><div class="notif-content">${msg}</div></div>`;
            }
        }
    });
}

// 4. Funções da Estante
function renderizarLivros() {
    const abas = {
        'aba-meus-livros': document.getElementById('aba-meus-livros'),
        'aba-quero-ler': document.getElementById('aba-quero-ler'),
        'aba-emprestados': document.getElementById('aba-emprestados')
    };

    Object.values(abas).forEach(a => a.innerHTML = "");

    minhaEstante.forEach(livro => {
        const card = document.createElement('section');
        card.className = 'post-card';
        
        let infoExtra = livro.prazo ? `<p style="font-size:0.7rem; color:gray;">Prazo: ${livro.prazo}</p>` : "";
        let statusTxt = livro.status === 'tenho' ? 'Disponível' : (livro.status === 'desejo' ? 'Desejado' : `Com ${livro.usuario || 'alguém'}`);

        card.innerHTML = `
            <div class="book-info-wrapper">
                <div class="book-cover ${livro.status === 'tenho' ? 'available' : 'borrowed'}"></div>
                <div class="book-details">
                    <p><strong>${livro.titulo}</strong></p>
                    <p>${livro.autor}</p>
                    <span class="status-text ${livro.status !== 'tenho' ? 'warning' : ''}">${statusTxt}</span>
                    ${infoExtra}
                </div>
            </div>
            <button class="btn-excluir" onclick="removerLivro(${livro.id})">🗑️</button>
        `;

        if (livro.status === 'tenho' || livro.status === 'emprestado_fora') abas['aba-meus-livros'].appendChild(card);
        else if (livro.status === 'desejo') abas['aba-quero-ler'].appendChild(card);
        else abas['aba-emprestados'].appendChild(card);
    });
    atualizarContadores();
}

function removerLivro(id) {
    if(confirm("Excluir livro?")) {
        minhaEstante = minhaEstante.filter(l => l.id !== id);
        renderizarLivros();
        atualizarSino();
    }
}

// 5. Auxiliares (Sino, Abas, Contadores)
function atualizarSino() {
    const prazos = minhaEstante.filter(l => l.prazo).length;
    document.getElementById('badge-notif').innerText = 1 + prazos; // 1 da Samara + prazos
}

function mudarAbaPrincipal(id, btn) {
    document.querySelectorAll('.main-tab').forEach(v => v.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function trocarSubAba(id, btn) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function irParaEstante(subAba, btnFiltroId) {
    const btnEstanteNav = document.querySelectorAll('.tab-item')[1];
    mudarAbaPrincipal('view-estante', btnEstanteNav);
    trocarSubAba(subAba, document.getElementById(btnFiltroId));
}

function atualizarContadores() {
    document.getElementById('count-meus').innerText = minhaEstante.filter(l => l.status === 'tenho' || l.status === 'emprestado_fora').length;
    document.getElementById('count-quero').innerText = minhaEstante.filter(l => l.status === 'desejo').length;
    document.getElementById('count-emprestimos').innerText = minhaEstante.filter(l => l.status === 'comigo').length;
}

function abrirModal() { document.getElementById('modal-adicionar').style.display = 'flex'; }
function fecharModal() { document.getElementById('modal-adicionar').style.display = 'none'; }

function salvarLivro() {
    const t = document.getElementById('input-titulo').value;
    const a = document.getElementById('input-autor').value;
    const s = document.getElementById('select-tipo').value;
    if(t && a) {
        minhaEstante.push({ id: Date.now(), titulo: t, autor: a, status: s });
        fecharModal();
        renderizarLivros();
    }
}

// 6. Agenda Simplificada
function renderizarCalendario() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = "";
    for (let i = 1; i <= 31; i++) {
        const dia = i < 10 ? `0${i}/03` : `${i}/03`;
        const tem = minhaEstante.find(l => l.prazo === dia);
        grid.innerHTML += `<div class="calendar-day" onclick="alert('Compromisso dia ${dia}')">${i}${tem ? '<span class="dot dot-devolver"></span>' : ''}</div>`;
    }
}
    </script>
</body>
</html>
